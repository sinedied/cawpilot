services:
  cawpilot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./workspace:/app/workspace
      - ./.cawpilot:/app/.cawpilot
      - signal-data:/root/.local/share/signal-cli
    environment:
      - GITHUB_TOKEN
      - SIGNAL_PHONE_NUMBER
    restart: unless-stopped

volumes:
  signal-data:
